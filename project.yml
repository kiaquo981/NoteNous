name: NoteNous
options:
  bundleIdPrefix: com.notenous
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"

configs:
  Debug: debug
  Release: release

targets:
  NoteNous:
    type: application
    platform: macOS
    sources:
      - path: NoteNous
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notenous.app
        INFOPLIST_KEY_CFBundleDisplayName: NoteNous
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 NoteNous"
        CODE_SIGN_ENTITLEMENTS: NoteNous/NoteNous.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: NoteNous/NoteNous.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  NoteNousTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NoteNousTests
    dependencies:
      - target: NoteNous
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notenous.app.tests
