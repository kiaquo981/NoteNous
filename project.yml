name: NoteNous
options:
  bundleIdPrefix: com.notenous
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1.0"

configs:
  Debug: debug
  Release: release

targets:
  NoteNous:
    type: application
    platform: macOS
    sources:
      - path: NoteNous
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notenous.app
        INFOPLIST_KEY_CFBundleDisplayName: NoteNous
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 NoteNous"
        CODE_SIGN_ENTITLEMENTS: NoteNous/NoteNous.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "NoteNous needs microphone access to listen and transcribe calls in real-time."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "NoteNous uses on-device speech recognition to transcribe calls in real-time."
    entitlements:
      path: NoteNous/NoteNous.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.notenous.app
        com.apple.developer.icloud-services:
          - CloudKit

  NoteNousIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NoteNousIOS
      - path: NoteNous/Models
        excludes:
          - "Enums"
      - path: NoteNous/Models/Enums
      - path: NoteNous/Services/Domain/NoteService.swift
      - path: NoteNous/Services/Domain/TagService.swift
      - path: NoteNous/Services/Domain/DailyNoteService.swift
      - path: NoteNous/Services/Domain/SpacedRepetitionService.swift
      - path: NoteNous/Services/Domain/ZettelIDGenerator.swift
      - path: NoteNous/Utilities/Constants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notenous.ios
        INFOPLIST_KEY_CFBundleDisplayName: NoteNous
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "NoteNous needs microphone access for voice capture"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "NoteNous uses speech recognition to transcribe voice notes"

  NoteNousClipper:
    type: app-extension
    platform: macOS
    sources:
      - path: NoteNousClipper
        excludes:
          - "Resources/**"
    resources:
      - path: NoteNousClipper/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notenous.app.clipper
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.Safari.web-extension
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  NoteNousTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NoteNousTests
    dependencies:
      - target: NoteNous
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notenous.app.tests

schemes:
  NoteNous:
    build:
      targets:
        NoteNous: all
        NoteNousTests: [test]
    test:
      targets:
        - NoteNousTests
